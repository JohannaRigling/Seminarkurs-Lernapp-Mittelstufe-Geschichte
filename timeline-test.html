<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interaktiver Zeitstrahl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #e07060;
            --secondary: #c85a4a;
            --bg-primary: #0d0d14;
            --bg-secondary: #131320;
            --bg-tertiary: #1a1a2e;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --border-color: #2a2a3a;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 8px;
            gap: 6px;
        }

        /* ===== TOP BAR ===== */
        #topBar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 4px 12px;
            border: 1.5px solid var(--primary);
            border-radius: 16px;
            background: transparent;
            color: #a0a0a0;
            font-size: 0.8em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .mode-btn:hover { color: var(--primary); }
        .mode-btn.active { background: var(--primary); color: white; }

        .bar-sep {
            width: 1px;
            height: 18px;
            background: var(--border-color);
            flex-shrink: 0;
        }

        .zoom-btn {
            padding: 3px 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
            font-size: 1em;
            line-height: 1;
            cursor: pointer;
            transition: background 0.15s;
        }
        .zoom-btn:hover { background: var(--primary); border-color: var(--primary); }

        #zoomLevel {
            min-width: 28px;
            text-align: center;
            font-size: 0.85em;
            font-weight: bold;
            color: var(--primary);
        }

        /* K10 Legende = Imperien-Filter – rechts in der Top-Bar */
        .k10-legend {
            display: none;
            align-items: center;
            gap: 4px;
            margin-left: auto;
        }
        .k10-legend.visible { display: flex; }
        .k10-legend-label {
            font-size: 0.72em;
            color: var(--text-secondary);
            margin-right: 4px;
        }
        .k10-legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.76em;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            border: 1.5px solid transparent;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.15s, background 0.15s, border-color 0.15s;
            color: var(--text-primary);
        }
        .k10-legend-item:hover { background: rgba(255,255,255,0.06); }
        .k10-legend-item.active { border-color: var(--theme-color, var(--border-color)); }
        .k10-legend-item:not(.active) { opacity: 0.35; }
        .k10-legend-item:not(.active) .k10-legend-dot { background: #666 !important; }
        .k10-legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.15s;
        }

        /* ===== TIMELINE CONTAINER füllt den Rest ===== */
        #timelineContainer {
            position: relative;
            flex: 1;
            min-height: 0;
            background: var(--bg-secondary);
            border-radius: 10px;
            overflow-x: scroll;
            overflow-y: hidden;
            cursor: grab;
            border: 2px solid var(--primary);
        }
        #timelineContainer:active { cursor: grabbing; }

        #timelineTrack {
            position: relative;
            height: 100%;
            min-height: 100%;
            padding: 0 60px;
        }

        /* Scrollbar */
        #timelineContainer::-webkit-scrollbar { height: 12px; }
        #timelineContainer::-webkit-scrollbar-track { background: #0a0a12; }
        #timelineContainer::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 6px;
            border: 2px solid #0a0a12;
        }
        #timelineContainer::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(90deg, var(--secondary), var(--primary));
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Top Bar: Modus + Zoom + K10-Legende in einer Zeile -->
    <div id="topBar">
        <button id="btnModeAllgemein" class="mode-btn active" onclick="switchTimelineMode('allgemein')">Klasse 8–10</button>
        <button id="btnModeKlasse10" class="mode-btn" onclick="switchTimelineMode('klasse10')">Klasse 10: Imperien</button>

        <div class="bar-sep"></div>

        <button class="zoom-btn" onclick="zoomTimeline('out')">−</button>
        <span id="zoomLevel">1×</span>
        <button class="zoom-btn" onclick="zoomTimeline('in')">+</button>

        <div class="k10-legend" id="k10Legend">
            <span class="k10-legend-label">Imperien:</span>
            <div class="k10-legend-item active" data-theme="russland"
                 style="--theme-color:#c0392b;" onclick="toggleEmpireFilter('russland')">
                <div class="k10-legend-dot" style="background:#c0392b;"></div>
                <span>Russland</span>
            </div>
            <div class="k10-legend-item active" data-theme="china"
                 style="--theme-color:#d4a017;" onclick="toggleEmpireFilter('china')">
                <div class="k10-legend-dot" style="background:#d4a017;"></div>
                <span>China</span>
            </div>
            <div class="k10-legend-item active" data-theme="osmanisch"
                 style="--theme-color:#16a085;" onclick="toggleEmpireFilter('osmanisch')">
                <div class="k10-legend-dot" style="background:#16a085;"></div>
                <span>Osmanisches Reich</span>
            </div>
        </div>
    </div>

    <!-- Zeitstrahl füllt gesamten verbleibenden Raum -->
    <div id="timelineContainer">
        <div id="timelineTrack"></div>
    </div>

</div>

<script src="js/timeline-v2-data.js?t=1778800000"></script>
<script src="js/timeline-v3.js?t=1778800000"></script>
</body>
</html>
